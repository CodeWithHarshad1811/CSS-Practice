<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Business Card</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
 <div class="business-card">
    <img class="profile-image"
    src="https://cdn.freecodecamp.org/curriculum/labs/flower.jpg" alt="flower">
    <p class="full-name">Your Name</p>
    <p class="designation">Software Developer</p>
    <p class="company">Company Name</p>
    <hr>
    <p>123@gmail.com</p>
    <p>Phone Number</p>
    <a class="portfolio-link" href="http:example.com">Portfolio</a>
    <hr>
    <div class="social-media">
     <h2>Connect with me</h2>
     <a href="http:example.com">Twitter</a>
     <a href="http:example.com">LinkedIn</a>
     <a href="http:example.com">GitHub</a>
    </div>

 </div>
 
</body>

</html>
